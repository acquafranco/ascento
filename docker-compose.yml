services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ascensores_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
    networks:
      - ascensores

  nginx:
    image: nginx:alpine
    container_name: ascensores_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ascensores

  mysql:
    image: mysql:8.0
    container_name: ascensores_mysql
    restart: always
    environment:
      MYSQL_DATABASE: ascensores
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: laravel
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ascensores

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ascensores_phpmyadmin
    restart: always
    depends_on:
      - mysql
    ports:
      - "8090:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    networks:
      - ascensores

networks:
  ascensores:

volumes:
  mysql_data:
